<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FARHAN 8D GLOBAL - PRO</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;600&display=swap');
        
        :root { --neon-blue: #00f3ff; --neon-pink: #ff0055; --gold: #ffcc00; }

        body {
            background-image: url('https://i.ibb.co/0RCgRd7S/i-Stock-1218501876.jpg');
            background-size: cover; background-position: center;
            color: #fff; font-family: 'Poppins', sans-serif;
            margin: 0; height: 100vh; display: flex; justify-content: center;
            align-items: center; overflow: hidden; perspective: 2000px;
        }

        .header-ui {
            position: fixed; top: 15px; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; box-sizing: border-box; z-index: 1000;
        }

        #top-status {
            padding: 8px 15px; border-radius: 12px; font-family: 'Orbitron';
            font-size: 9px; font-weight: bold; min-width: 160px; text-align: center;
        }
        .status-warning { background: rgba(255, 0, 0, 0.7); border: 1px solid #ff0000; color: #fff; }
        .status-pro { background: rgba(255, 204, 0, 0.2); border: 1px solid var(--gold); color: var(--gold); }

        .pro-badge { 
            padding: 10px 25px; background: var(--gold); color: #000; 
            font-family: 'Orbitron'; font-weight: 900; border-radius: 15px; 
            cursor: pointer; box-shadow: 0 0 15px var(--gold); font-size: 12px;
        }

        .terminal-8d {
            width: 90%; max-width: 380px; padding: 25px; border-radius: 35px;
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 243, 255, 0.3); text-align: center;
            transform-style: preserve-3d; margin-top: 40px;
        }

        .robot-logo { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--neon-blue); margin-bottom: 10px; }

        .selection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .cyber-select { padding: 10px; background: rgba(0, 0, 0, 0.8); color: var(--neon-blue); border: 1px solid var(--neon-blue); border-radius: 10px; font-family: 'Orbitron'; font-size: 9px; }

        .btn-8d { width: 100%; padding: 16px; background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue); font-family: 'Orbitron'; font-weight: 900; border-radius: 15px; cursor: pointer; }

        #display-8d { min-height: 110px; margin-top: 15px; background: rgba(0, 0, 0, 0.6); border-radius: 20px; display: flex; flex-direction: column; justify-content: center; border: 1px solid rgba(0,243,255,0.1); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; padding-top: 20px; }
        .pricing-card { background: #0a0a0a; border: 1px solid var(--gold); border-radius: 20px; padding: 15px; width: 85%; max-width: 300px; margin: 5px; text-align: center; }
        .bank-details-card { background: #fff; color: #000; padding: 25px; border-radius: 20px; width: 85%; max-width: 300px; text-align: center; }
        .subscribe-btn { background: var(--gold); color: #000; padding: 10px 30px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; width: 100%; }
    </style>
</head>
<body>

    <div class="header-ui">
        <div id="top-status" class="status-warning">⚠️ BASIC MODE (45%)</div>
        <div class="pro-badge" onclick="showPricing()">PRO</div>
    </div>

    <div class="terminal-8d" id="bot8D">
        <img src="https://i.ibb.co/GfGypBGD/intelligent-robot-500x500.jpg" class="robot-logo">
        <h2 style="font-family:'Orbitron'; font-size:16px; margin:0;">FARHAN GLOBAL 8D</h2>
        <p style="font-size:8px; color:var(--neon-blue); letter-spacing:4px;">CEO FARHAN ALI</p>

        <div class="selection-grid">
            <select id="asset-pair" class="cyber-select">
                <optgroup label="LIVE & MAJOR">
                    <option>EUR/USD (Live)</option><option>GBP/USD (Live)</option><option>XAU/USD (Gold)</option><option>USD/JPY (Live)</option>
                </optgroup>
                <optgroup label="OTC MARKETS">
                    <option>EUR/USD (OTC)</option><option>GBP/USD (OTC)</option><option>USD/JPY (OTC)</option><option>AUD/CAD (OTC)</option>
                </optgroup>
            </select>
            <select id="time-frame" class="cyber-select">
                <option>5 SEC</option><option>15 SEC</option><option>30 SEC</option>
                <option selected>1 MIN</option><option>5 MIN</option><option>15 MIN</option><option>1 HOUR</option>
            </select>
        </div>

        <button class="btn-8d" onclick="run8DScan()">START NEURAL SCAN</button>

        <div id="display-8d">
            <div id="status-8d" style="font-size: 10px; color: #777;">SYSTEM READY</div>
            <div id="signal-out" style="display:none;">
                <div id="dir-val" style="font-size: 32px; font-weight: 900;"></div>
                <div id="acc-label" style="color:var(--gold); font-size:9px; font-family:'Orbitron';"></div>
            </div>
        </div>
    </div>

    <div id="pricing-modal" class="modal">
        <h2 style="color:var(--gold); font-family:'Orbitron'; margin-bottom:10px;">VIP ACCESS</h2>
        <div class="pricing-card" style="border-color: var(--gold);">
            <h3 style="margin:0; color:var(--gold);">VIP DEEP SCAN</h3>
            <p style="font-size:22px; font-weight:900; margin:5px 0;">30$</p>
            <p style="font-size:10px;">Accuracy: 98.9% (Neural Deep Scan)</p>
            <button class="subscribe-btn" onclick="openBank('30$')">SUBSCRIBE</button>
        </div>
        <div class="pricing-card" style="border-color: var(--neon-blue);">
            <h3 style="margin:0; color:var(--neon-blue);">ADVANCED SCAN</h3>
            <p style="font-size:22px; font-weight:900; margin:5px 0;">20$</p>
            <p style="font-size:10px;">Accuracy: 70% (Standard Analysis)</p>
            <button class="subscribe-btn" style="background:var(--neon-blue);" onclick="openBank('20$')">SUBSCRIBE</button>
        </div>
        <div class="pricing-card" style="border-color: #444;">
            <h3 style="margin:0; color:#888;">BASIC SCAN</h3>
            <p style="font-size:22px; font-weight:900; margin:5px 0;">FREE</p>
            <p style="font-size:10px;">Accuracy: 45% (Random Signals)</p>
            <button class="subscribe-btn" style="background:#444; color:#fff;" onclick="activateFree()">ACTIVATE</button>
        </div>
        <p onclick="closePricing()" style="cursor:pointer; margin-top:10px; color:#fff;">[ CLOSE ]</p>
    </div>

    <div id="bank-modal" class="modal">
        <div class="bank-details-card">
            <p style="font-size:11px; color:#666;">PAYMENT TO UBL</p>
            <p style="font-size:20px; font-weight:900; margin:10px 0;">0391320282803</p>
            <button class="subscribe-btn" style="background:#25D366; color:#fff;" onclick="contactWhatsApp()">WHATSAPP SCREENSHOT</button>
            <hr style="margin:15px 0;">
            <input type="text" id="vip-key" placeholder="ENTER VIP KEY" style="width:80%; padding:10px; text-align:center; border:1px solid #ccc; border-radius:5px;">
            <button onclick="unlockBot()" style="margin-top:10px; background:#000; color:#fff; padding:10px 20px; border-radius:5px; width:80%;">ACTIVATE VIP</button>
            <p onclick="closeBank()" style="cursor:pointer; margin-top:10px; font-size:12px;">[ BACK ]</p>
        </div>
    </div>

    <script>
        let userLevel = localStorage.getItem('farhan_level') || 'free';
        
        window.onload = function() {
            updateUI();
        };

        function updateUI() {
            const statusBox = document.getElementById('top-status');
            if(userLevel === 'vip') {
                statusBox.className = "status-pro";
                statusBox.innerText = "⭐ VIP ACTIVE (98.9%)";
            } else if(userLevel === 'advanced') {
                statusBox.className = "status-pro";
                statusBox.style.borderColor = "var(--neon-blue)";
                statusBox.style.color = "var(--neon-blue)";
                statusBox.innerText = "⚡ ADVANCED (70%)";
            } else {
                statusBox.className = "status-warning";
                statusBox.innerText = "⚠️ BASIC MODE (45%)";
            }
        }

        function showPricing() { document.getElementById('pricing-modal').style.display = 'flex'; }
        function closePricing() { document.getElementById('pricing-modal').style.display = 'none'; }
        function openBank() { 
            document.getElementById('pricing-modal').style.display = 'none';
            document.getElementById('bank-modal').style.display = 'flex'; 
        }
        function closeBank() { document.getElementById('bank-modal').style.display = 'none'; showPricing(); }

        function contactWhatsApp() {
            window.location.href = "https://wa.me/923136908663?text=Farhan%20Bhai%20Payment%20Done.%20Please%20verify.";
        }

        function activateFree() {
            userLevel = 'free';
            localStorage.setItem('farhan_level', 'free');
            updateUI();
            closePricing();
            alert("Basic Plan Activated!");
        }

        function unlockBot() {
            const key = document.getElementById('vip-key').value;
            if(key === "VIP30") {
                userLevel = 'vip';
                localStorage.setItem('farhan_level', 'vip');
                alert("VIP 98.9% UNLOCKED!");
                location.reload();
            } else if(key === "ADV20") {
                userLevel = 'advanced';
                localStorage.setItem('farhan_level', 'advanced');
                alert("ADVANCED 70% UNLOCKED!");
                location.reload();
            } else { alert("Invalid Key!"); }
        }

        function run8DScan() {
            const status = document.getElementById('status-8d');
            const out = document.getElementById('signal-out');
            status.style.display = "block"; out.style.display = "none";
            
            if(userLevel === 'vip') {
                status.innerHTML = "DEEP SCANNING LIQUIDITY...";
                setTimeout(() => { status.innerHTML = "MAPPING NEURAL ORDER BLOCKS..."; }, 1500);
                setTimeout(() => { status.innerHTML = "98.9% PRECISION CONFIRMED..."; }, 3500);
                setTimeout(() => { displaySignal(0.98, "VIP DEEP SCAN CONFIRMED"); }, 5000);
            } else if(userLevel === 'advanced') {
                status.innerHTML = "ANALYZING MARKET FLOW...";
                setTimeout(() => { status.innerHTML = "CALCULATING 70% PROBABILITY..."; }, 2000);
                setTimeout(() => { displaySignal(0.70, "70% ANALYSIS SIGNAL"); }, 3500);
            } else {
                status.innerHTML = "QUICK RANDOM SCAN...";
                setTimeout(() => { displaySignal(0.45, "45% BASIC (RANDOM)"); }, 1500);
            }
        }

        function displaySignal(acc, label) {
            const status = document.getElementById('status-8d');
            const out = document.getElementById('signal-out');
            status.style.display = "none"; out.style.display = "block";
            const isUp = Math.random() < acc;
            const dir = document.getElementById('dir-val');
            dir.innerText = isUp ? "CALL ⬆️" : "PUT ⬇️";
            dir.style.color = isUp ? "#00ffcc" : "#ff0055";
            document.getElementById('acc-label').innerText = label;
        }
    </script>
</body>
</html>
