<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURELIUS PRO - BOSS EDITION</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;600&display=swap');
:root{ --neon-blue:#00f3ff; --neon-pink:#ff0055; --gold:#ffcc00; --bg:rgba(6, 11, 19, 0.98); }

body{ 
    background-color: #060b13;
    background-image: url('https://i.ibb.co/0RCgRd7S/i-Stock-1218501876.jpg');
    background-size: cover; background-attachment: fixed;
    color:white; font-family:Poppins; text-align:center; margin:0; overflow-x: hidden;
}

.logo-container { width: 100%; display: flex; justify-content: center; margin-top: 50px; margin-bottom: -40px; }
.app-logo { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); object-fit: cover; }

.terminal-8d{ 
    width:92%; max-width:430px; margin:70px auto; 
    background:var(--bg); backdrop-filter:blur(15px);
    padding:30px 20px; border-radius:35px; 
    border:1px solid var(--neon-blue); box-shadow: 0 0 40px rgba(0, 243, 255, 0.2);
}

#search-box {
    width: 100%; padding: 12px; background: #000; border: 1px solid #1e2329;
    border-radius: 10px; color: var(--gold); font-family: Orbitron; font-size: 11px;
    margin-bottom: 10px; outline: none; display: none;
}

.cyber-select{ 
    width:100%; padding:15px; background:#000; color:var(--neon-blue); 
    border:1px solid #1e2329; border-radius:12px; font-family:Orbitron; 
    font-size:11px; margin-bottom:12px; outline:none;
}

.btn-8d{ 
    width:100%; padding:20px; background:transparent; border:2px solid var(--neon-blue); 
    color:var(--neon-blue); font-family:Orbitron; font-weight:900; 
    border-radius:15px; cursor:pointer; text-transform:uppercase;
}
.btn-8d:hover { background: var(--neon-blue); color: black; }

.toggle-search { font-size: 10px; color: var(--gold); cursor: pointer; text-align:right; }

#display { 
    margin: 20px 0; min-height: 150px; background: rgba(0,0,0,0.6); 
    border-radius: 20px; display: flex; flex-direction:column; align-items: center; justify-content: center;
}

#chart-area { border-radius: 20px; overflow: hidden; height: 280px; }

.indicator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 10px; margin-top:10px; }
.status-ok { color: #00ffcc; }
.scanning-text { font-size: 10px; color: var(--neon-blue); }

.big-signal{
    font-size:40px;
    font-family:Orbitron;
    margin:0;
    text-shadow:0 0 20px currentColor;
}
</style>
</head>
<body>

<div class="logo-container">
<img src="https://i.ibb.co/nGXQ4gr/Untitled-design-20260315-213122-0000.png" class="app-logo">
</div>

<div class="terminal-8d">
<h2 style="color:var(--neon-blue);">AURELIUS PRO</h2>

<span class="toggle-search" onclick="toggleSearch()">🔍 SEARCH</span>
<input type="text" id="search-box" onkeyup="filterPairs()">

<select class="cyber-select" id="market-pair" onchange="refreshChart()"></select>

<select class="cyber-select" id="time-frame" onchange="refreshChart()">
<option value="1S">15 SEC</option>
<option value="1">1 MIN</option>
<option value="5">5 MIN</option>
<option value="15">15 MIN</option>
<option value="30">30 MIN</option>
<option value="60">1 HOUR</option>
</select>

<button class="btn-8d" onclick="startAnalysis()">ANALYZE</button>

<div id="display">
<p style="font-size:10px;color:#555;">READY FOR SIGNAL</p>
</div>

<div id="chart-area">
<div id="tv_chart_container" style="height:100%"></div>
</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>

let allPairs=[];

async function loadPairs(){
    const res=await fetch("https://api.binance.com/api/v3/exchangeInfo");
    const data=await res.json();

    allPairs = data.symbols
        .filter(s=>s.status==="TRADING" && s.quoteAsset==="USDT")
        .map(s=>({s:"BINANCE:"+s.symbol, n:s.symbol}));

    renderPairs(allPairs);
}

function renderPairs(data){
    const sel=document.getElementById("market-pair");
    sel.innerHTML=data.map(p=>`<option value="${p.s.split(':')[1]}">${p.n}</option>`).join('');
    refreshChart();
}

function toggleSearch(){
    const box=document.getElementById("search-box");
    box.style.display=box.style.display==='block'?'none':'block';
}

function filterPairs(){
    const term=document.getElementById("search-box").value.toUpperCase();
    renderPairs(allPairs.filter(p=>p.n.includes(term)));
}

function refreshChart(){
    const symbol=document.getElementById("market-pair").value;
    let interval=document.getElementById("time-frame").value;
    if(interval==="1S") interval="1";

    document.getElementById("tv_chart_container").innerHTML="";
    new TradingView.widget({
        autosize:true,
        symbol:"BINANCE:"+symbol,
        interval:interval,
        theme:"dark",
        container_id:"tv_chart_container"
    });
}

// ===== ANALYSIS =====

async function getCandles(symbol, interval="1m"){
    const res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=50`);
    return await res.json();
}

function RSI(data){
    let g=0,l=0;
    for(let i=1;i<15;i++){
        let d=data[i]-data[i-1];
        if(d>0) g+=d; else l-=d;
    }
    return 100-(100/(1+(g/l)));
}

function EMA(data,p){
    let k=2/(p+1), ema=data[0];
    data.forEach(v=>ema=v*k+ema*(1-k));
    return ema;
}

async function startAnalysis(){
    const disp=document.getElementById("display");
    const symbol=document.getElementById("market-pair").value;
    const tf=document.getElementById("time-frame").value;

    disp.innerHTML=`<p class="scanning-text">ANALYZING MARKET...</p>`;

    try{
        const candles=await getCandles(symbol, tf=="1S"?"1m":tf+"m");
        const closes=candles.map(c=>parseFloat(c[4]));

        const rsi=RSI(closes);
        const ema9=EMA(closes.slice(-20),9);
        const ema21=EMA(closes.slice(-20),21);
        const price=closes.at(-1);

        let signal="WAIT ⚠️",color="#ffcc00",msg="NO CLEAR TREND";

        if(rsi>55 && ema9>ema21){
            signal="UP 🟢"; color="#00ffcc"; msg="STRONG BULLISH";
        }
        else if(rsi<45 && ema9<ema21){
            signal="DOWN 🔴"; color="#ff0055"; msg="STRONG BEARISH";
        }

        disp.innerHTML=`
        <h1 class="big-signal" style="color:${color}">${signal}</h1>
        <p>PRICE: ${price}</p>

        <div class="indicator-grid">
        <span>RSI: <b class="status-ok">${rsi.toFixed(1)}</b></span>
        <span>EMA9: <b class="status-ok">${ema9.toFixed(1)}</b></span>
        <span>EMA21: <b class="status-ok">${ema21.toFixed(1)}</b></span>
        <span>STATUS: <b class="status-ok">LIVE</b></span>
        </div>

        <p style="font-size:9px;margin-top:5px;">${msg}</p>
        `;
    }
    catch{
        disp.innerHTML=`<p style="color:red;">API ERROR</p>`;
    }
}

window.onload=loadPairs;

</script>
</body>
</html>
